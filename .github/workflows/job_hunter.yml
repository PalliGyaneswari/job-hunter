name: 🎯 Daily Job Hunter

on:
  schedule:
    # Runs at 05:00 UTC and 17:00 UTC every day (10:30 AM IST and 10:30 PM IST)
    - cron: '0 5,17 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

permissions:
  contents: write  # Required to push updated data & dashboard back to repo

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. Checkout repository
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3. Install Python dependencies
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Install Playwright browsers
      - name: 🌐 Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      # 5. Run scraper
      - name: 🕷️ Run job scraper
        env:
          LINKEDIN_USER: ${{ secrets.LINKEDIN_USER }}
          LINKEDIN_PASS: ${{ secrets.LINKEDIN_PASS }}
        run: python src/scraper.py

      # 6. Generate dashboard
      - name: 📊 Generate dashboard
        run: python src/generate_pages.py

      # 7. Commit and push changes
      - name: 📤 Commit and push updates
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/ docs/
          if git diff --quiet --staged; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily job update $(date -u +%Y-%m-%d) [skip ci]"
            git push
          fi
